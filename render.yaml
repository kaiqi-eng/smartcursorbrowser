services:
  - type: web
    name: smartcursorbrowser
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm install && npm run build && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright npx playwright install chromium
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: SERVICE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: openai/gpt-4.1-mini
      - key: OPENROUTER_HTTP_REFERER
        sync: false
      - key: OPENROUTER_APP_TITLE
        value: smartcursorbrowser
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright
      - key: MAX_JOB_STEPS
        value: 25
      - key: JOB_TIMEOUT_MS
        value: 120000
      - key: ALLOWED_DOMAINS
        value: ""
